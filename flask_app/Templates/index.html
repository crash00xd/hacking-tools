<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Add/delete Post</title>
</head>
<body>
    <h1>Blog</h1>
    <form method="POST" action="{{ url_for('add_post') }}">
        <label>Title:</label></br>
        <input name="title"></br></br>
        <label>Author:</label></br>
        <input name="author"></br></br>
        <label>Content</label></br>
        <textarea name="content"></textarea></br></br>
        <input type="submit" value="Submit">
    </form>
    <br><hr>
    {% for post in posts %}
        <h2>{{ post.title }}</h2>
        <h4>{{ post.author }}</h4>
        <p>{{ post.content }}</p><br>
        <a href="{{ url_for('edit_post', id=post.id) }}"><button>Edit</button></a>
        <a href="{{ url_for('delete_post', id=post.id) }}"><button>Delete</button></a>
        <br><br><hr>
    {% endfor %}
</body>
</html>
